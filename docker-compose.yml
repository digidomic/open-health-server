# Production Docker Compose for Open Health Server
#
# IMPORTANT: Update the paths below to match your server setup!
# Example paths (adjust to your system):
#   - Linux: /home/username/open-health-server/config.json
#   - Windows: C:\Users\username\open-health-server\config.json

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ohs-backend
    ports:
      - "8002:8000"
    volumes:
      # DATA: SQLite database storage (bind mount)
      # Entrypoint script will fix permissions automatically
      - ./db:/app/db
      
      # CONFIG: User tokens and settings (REQUIRED)
      - ./config.json:/app/config.json:ro
      
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - ohs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ohs-frontend
    ports:
      - "8095:8080"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # API Configuration - choose ONE of these options:
      
      # Option 1: Full URL (for reverse proxy setups)
      # - API_URL=https://ohsbackend.doanet.de
      
      # Option 2: Host + Port (for direct access)
      - API_HOST=192.168.9.23
      - API_PORT=8002
      - API_PROTOCOL=http
    restart: unless-stopped
    networks:
      - ohs-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ohs-network:
    driver: bridge
    name: ohs-network
