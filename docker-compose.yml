# Production Docker Compose for Open Health Server
# 
# IMPORTANT: Update the paths below to match your server setup!
# Example paths (adjust to your system):
#   - Linux: /home/username/open-health-server/config.json
#   - Windows: C:\Users\username\open-health-server\config.json
#   - Docker Volume: ohs-config:/app/config.json

services:
  backend:
    # Build from local Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Optional: Use pre-built image from Docker Hub (when available)
    # image: digidomic/ohs-backend:latest
    container_name: ohs-backend
    ports:
      - "8000:8000"
    volumes:
      # DATA: SQLite database storage
      # Change this to your preferred data location
      - ./data:/app/data
      
      # CONFIG: User tokens and settings (REQUIRED)
      # Change this to your config file location
      # Format: /path/on/host:/path/in/container:ro
      - ./config.json:/app/config.json:ro
      
      # Alternative: Use absolute path
      # - /home/dominic/open-health-server/config.json:/app/config.json:ro
      
      # Alternative: Use Docker named volume
      # - ohs-config:/app/config.json:ro
      
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - ohs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    # Build from local Dockerfile
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Optional: Use pre-built image from Docker Hub (when available)
    # image: digidomic/ohs-frontend:latest
    container_name: ohs-frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ohs-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ohs-network:
    driver: bridge
    name: ohs-network

# Optional: Named volumes for persistent data
# Uncomment if you want to use Docker volumes instead of bind mounts
# volumes:
#   ohs-data:
#     driver: local
#   ohs-config:
#     driver: local
